<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Compare Text - Piyongo</title>
    <meta name="description" content="Instantly compare two texts. Find exact character and word differences.">
    
    <link rel="icon" type="image/svg+xml" href="../assets/favIcon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/design-system.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>

    <script>
        window.PAGE_CONFIG = { id: 'compare-text', type: 'tool', name: 'Compare Text' };
    </script>

<style>
        /* Placeholder hack for contenteditable divs */
        [contenteditable]:empty::before {
            content: attr(placeholder);
            color: #a3a3a3;
            pointer-events: none;
            display: block;
        }
    </style>
</head>
<body class="bg-[#f5f5f5] text-black font-sans flex flex-col min-h-screen selection:bg-[#FF4F00] selection:text-white">

    <script src="../js/config.js"></script>
    <script src="../js/translations.js"></script>
    <script src="../js/components.js"></script>

    <div id="header-mount"></div>

    <main class="flex-grow max-w-6xl mx-auto px-6 w-full pb-24 md:pb-32">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-6">
            <div class="flex flex-col gap-2 w-full">
                <div class="flex items-center justify-between w-full">
                    <h1 class="text-2xl md:text-3xl font-bold tracking-tight" data-i18n="tools.compare_title">Compare Text</h1>
                    <div class="flex items-center gap-3">
                        <button id="favBtn" class="group p-1.5 transition-transform active:scale-90 focus:outline-none">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="hover:text-[#FF4F00] transition-colors"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                        </button>
                        <div id="coffee-btn-placeholder" class="hidden md:block"></div>
                    </div>
                </div>
                <p class="text-neutral-500 font-mono text-sm leading-relaxed max-w-xl" data-i18n="tools.compare_desc">
                    Paste original text on the left, new text on the right, and click compare to see exact differences.
                </p>
            </div>
        </div>

        <div class="group bg-white border-2 border-black rounded-[24px] md:rounded-[32px] overflow-hidden transition-all duration-300 focus-within:shadow-[4px_4px_0px_0px_#000] md:focus-within:shadow-[8px_8px_0px_0px_#000] focus-within:-translate-y-1">
            
<div class="flex flex-col md:flex-row justify-between items-center gap-4 p-4 md:p-6 bg-white border-b-2 border-black/5 transition-colors duration-200 group-focus-within:bg-neutral-50">
    
    <div class="flex flex-wrap gap-4 w-full md:w-auto justify-center md:justify-start items-center">
        <button onclick="compareTexts()" class="px-6 py-2 border-2 border-black bg-black text-white hover:bg-white hover:text-black font-bold font-mono text-xs uppercase tracking-wider rounded-xl md:rounded-2xl transition-all flex items-center gap-2 group/btn shadow-[2px_2px_0px_0px_#000] active:translate-y-0.5 active:shadow-none">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12H3"></path><path d="M16 7l5 5-5 5"></path><path d="M8 7l-5 5 5 5"></path></svg>
            <span data-i18n="ui.btn_compare">COMPARE TEXT</span>
        </button>

        <div class="font-mono text-sm text-neutral-400 flex items-center gap-3">
        </div>
    </div>

    <div class="flex items-center justify-end gap-3 w-full md:w-auto">
        <button onclick="copyActiveBox()" class="icon-btn border-2 border-neutral-200 px-4 py-2 text-black hover:border-black rounded-2xl transition-colors flex items-center gap-2 bg-white" title="Copy Active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <span class="font-bold font-mono text-xs uppercase tracking-wider" data-i18n="ui.btn_copy">COPY</span>
        </button>

        <button onclick="clearAll()" class="icon-btn border-2 border-neutral-200 px-4 py-2 text-black hover:border-black rounded-2xl transition-colors flex items-center gap-2 bg-white" title="Clear All">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            <span class="font-bold font-mono text-xs uppercase tracking-wider" data-i18n="ui.btn_clear">CLEAR</span>
        </button>
    </div>
</div>
            <div class="grid grid-cols-1 md:grid-cols-2 divide-y-2 md:divide-y-0 md:divide-x-2 divide-black/10">
                <div class="relative p-4 md:p-6 flex flex-col">
                    <div id="leftInput" contenteditable="true" class="w-full flex-grow min-h-[400px] font-mono text-sm md:text-base focus:outline-none whitespace-pre-wrap leading-relaxed" data-i18n-placeholder="ui.placeholder_left" placeholder="1"></div>
                </div>
                <div class="relative p-4 md:p-6 flex flex-col bg-neutral-50/50">
<div id="rightInput" contenteditable="true" class="w-full flex-grow min-h-[400px] font-mono text-sm md:text-base focus:outline-none whitespace-pre-wrap leading-relaxed" data-i18n-placeholder="ui.placeholder_right" placeholder="2"></div>
                
            </div>
        </div>

        <div id="copyOverlay" class="fixed top-10 left-1/2 -translate-x-1/2 pointer-events-none opacity-0 transition-all duration-300 transform translate-y-4 z-50">
            <div class="bg-black text-white px-6 py-2 rounded-full font-bold font-mono text-sm shadow-xl flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span data-i18n="ui.msg_copied">COPIED!</span>
            </div>
        </div>

    </main>

  <script>
    const leftDiv = document.getElementById('leftInput');
    const rightDiv = document.getElementById('rightInput');
    const overlay = document.getElementById('copyOverlay');
    const statExtras = document.getElementById('statExtras');
    const statMissings = document.getElementById('statMissings');

    let lastActiveBox = 'rightInput'; 

    leftDiv.addEventListener('focus', () => lastActiveBox = 'leftInput');
    rightDiv.addEventListener('focus', () => lastActiveBox = 'rightInput');

    // --- GÜVENLİ ÇEVİRİ FİXİ ---
    function fixPlaceholders() {
        // Senin sistemindeki global değişkenleri kullanarak güvenli bir şekilde çeker
        const lang = typeof currentLang !== 'undefined' ? currentLang : 'en';
        const trans = window.translations ? window.translations[lang] : null;
        
        if (trans && trans.ui) {
            if (leftDiv) leftDiv.setAttribute('placeholder', trans.ui.placeholder_left || "1");
            if (rightDiv) rightDiv.setAttribute('placeholder', trans.ui.placeholder_right || "2");
        }
    }
    // Sayfa yüklendiğinde ve dil değiştiğinde çalıştır
    document.addEventListener('DOMContentLoaded', () => setTimeout(fixPlaceholders, 100));
    window.addEventListener('languageChanged', fixPlaceholders);


    // Helper: Kodların bozulmasını engeller
    function escapeHtml(unsafe) {
        return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function getPlainText(el) {
        return el.innerText || '';
    }

    // --- ANA KARŞILAŞTIRMA FONKSİYONU ---
    function compareTexts() {
        const leftText = getPlainText(leftDiv);
        const rightText = getPlainText(rightDiv);

        if (!leftText && !rightText) return;

        const dmp = new diff_match_patch();
        const diffs = dmp.diff_main(leftText, rightText);
        dmp.diff_cleanupSemantic(diffs);

        let leftHtml = '';
        let rightHtml = '';
        let extrasCount = 0;
        let missingsCount = 0;

        diffs.forEach(([operation, text]) => {
            const escapedText = escapeHtml(text).replace(/\n/g, '<br>');

            if (operation === 0) {
                leftHtml += escapedText;
                rightHtml += escapedText;
            } else if (operation === -1) {
                missingsCount += text.length;
                leftHtml += `<span class="bg-[#DE350B]/20 text-[#DE350B] rounded-sm font-bold px-0.5">${escapedText}</span>`;
            } else if (operation === 1) {
                extrasCount += text.length;
                rightHtml += `<span class="bg-[#00875A]/20 text-[#00875A] rounded-sm font-bold px-0.5">${escapedText}</span>`;
            }
        });

        leftDiv.innerHTML = leftHtml;
        rightDiv.innerHTML = rightHtml;

        // Sayaçları Güncelle
        if (statExtras) statExtras.innerText = extrasCount;
        if (statMissings) statMissings.innerText = missingsCount;
    }

    function handlePaste(e) {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
    }

    leftDiv.addEventListener('paste', handlePaste);
    rightDiv.addEventListener('paste', handlePaste);

    function clearAll() {
        leftDiv.innerHTML = '';
        rightDiv.innerHTML = '';
        if (statExtras) statExtras.innerText = '0';
        if (statMissings) statMissings.innerText = '0';
        leftDiv.focus();
    }

    function copyActiveBox() {
        const targetDiv = document.getElementById(lastActiveBox);
        const text = getPlainText(targetDiv);
        
        if (!text) return;
        
        navigator.clipboard.writeText(text).then(() => {
            overlay.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => { overlay.classList.add('opacity-0', 'translate-y-4'); }, 1500);
        });

        
    }
</script>
</body>
</html>
